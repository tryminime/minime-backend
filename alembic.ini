# Alembic configuration for MiniMe backend
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = migrations

# Database URL — overridden at runtime by env var DATABASE_URL
sqlalchemy.url = postgresql://minime:minime_dev_password@localhost:5432/minime

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
