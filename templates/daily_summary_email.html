<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Daily Summary - MiniMe</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <!-- Email Container -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f5f5f5;">
        <tr>
            <td style="padding: 40px 20px;">
                <!-- Main Content Card -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    
                    <!-- Header -->
                    <tr>
                        <td style="padding: 32px 32px 24px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px 12px 0 0;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 28px; font-weight: 700;">
                                Your Daily Summary
                            </h1>
                            <p style="margin: 8px 0 0 0; color: #e0e7ff; font-size: 16px;">
                                {{ date_formatted }}
                            </p>
                        </td>
                    </tr>
                    
                   <!-- Metrics Summary -->
                    <tr>
                        <td style="padding: 24px 32px; background-color: #fafafa;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <!-- Focus Score -->
                                    <td width="33%" style="padding: 12px; text-align: center; vertical-align: top;">
                                        <div style="padding: 16px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb;">
                                            <div style="font-size: 32px; font-weight: 700; color: {{ focus_color }}; margin-bottom: 4px;">
                                                {{ focus_score }}
                                            </div>
                                            <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                                                Focus Score
                                            </div>
                                        </div>
                                    </td>
                                    
                                    <!-- Deep Work -->
                                    <td width="33%" style="padding: 12px; text-align: center; vertical-align: top;">
                                        <div style="padding: 16px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb;">
                                            <div style="font-size: 32px; font-weight: 700; color: #667eea; margin-bottom: 4px;">
                                                {{ deep_work_hours }}h
                                            </div>
                                            <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                                                Deep Work
                                            </div>
                                        </div>
                                    </td>
                                    
                                    <!-- Meeting Load -->
                                    <td width="33%" style="padding: 12px; text-align: center; vertical-align: top;">
                                        <div style="padding: 16px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb;">
                                            <div style="font-size: 32px; font-weight: 700; color: #764ba2; margin-bottom: 4px;">
                                                {{ meeting_load }}%
                                            </div>
                                            <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                                                Meetings
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Summary Content -->
                    <tr>
                        <td style="padding: 32px 32px 24px 32px;">
                            <div style="font-size: 16px; line-height: 1.6; color: #374151;">
                                {{ summary_html }}
                            </div>
                        </td>
                    </tr>
                    
                    <!-- CTA Button -->
                    <tr>
                        <td style="padding: 0 32px 32px 32px; text-align: center;">
                            <a href="{{ dashboard_url }}" style="display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px;">
                                View Full Analytics →
                            </a>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 24px 32px; background-color: #fafafa; border-radius: 0 0 12px 12px; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 12px; color: #6b7280; text-align: center;">
                                MiniMe - Your Personal Analytics Assistant
                            </p>
                            <p style="margin: 8px 0 0 0; font-size: 12px; color: #9ca3af; text-align: center;">
                                <a href="{{ settings_url }}" style="color: #667eea; text-decoration: none;">Email Preferences</a> • 
                                <a href="{{ unsubscribe_url }}" style="color: #667eea; text-decoration: none;">Unsubscribe</a>
                            </p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
